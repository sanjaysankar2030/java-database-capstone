spring.application.name=back-end

# -------------------------
# MySQL Configuration
# -------------------------
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/cms?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# -------------------------
# MongoDB Configuration
# -------------------------
spring.data.mongodb.uri=mongodb://127.0.0.1:27017/prescriptions

# -------------------------
# Actuator
# -------------------------
management.endpoint.health.show-details=always
management.health.db.enabled=true

# -------------------------
# App Config
# -------------------------
api.path=/
jwt.secret=$!@#$^%$$$%####$DDCPN0234FCFDPD8670M

# -------------------------
# Static + Thymeleaf
# -------------------------
spring.web.resources.static-locations=classpath:/static/

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8